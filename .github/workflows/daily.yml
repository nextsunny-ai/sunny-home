name: Daily Refresh

# 뉴스·프로젝트 데이터를 매일 자동 갱신한다.
# GitHub Actions 의 schedule 은 정시를 보장하지 않고 가끔 한 회차를 건너뛴다.
# 그래서 하루 2회(06시·23시 KST)로 돌려, 한 번 누락돼도 다음 회차가 따라잡게 한다.
on:
  schedule:
    - cron: '0 21 * * *'   # 매일 06:00 KST (UTC 전날 21:00) — 주말 포함
    - cron: '0 14 * * *'   # 매일 23:00 KST (UTC 당일 14:00) — 주말 포함
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch news (7 categories, 누적 병합)
        run: python scripts/fetch_news.py

      - name: Refresh projects
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/refresh_projects.py

      - name: Refresh build timestamp
        run: python scripts/refresh_build.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: news refresh $(date -u +%Y-%m-%dT%H:%M)"
          git push
