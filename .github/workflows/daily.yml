name: Daily Refresh

on:
  schedule:
    - cron: '0 21 * * 0-4'   # 06:00 KST 월~금 (UTC 일~목 21:00)
    - cron: '0 14 * * 1-5'   # 23:00 KST 월~금 (UTC 월~금 14:00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch news (8 categories)
        run: python scripts/fetch_news.py

      - name: Refresh projects
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/refresh_projects.py

      - name: Refresh build timestamp
        run: python scripts/refresh_build.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: news refresh $(date -u +%Y-%m-%dT%H:%M)"
          git push
