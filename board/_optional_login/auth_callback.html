<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>써니보드 — 로그인 처리 중</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Pretendard Variable', sans-serif;
  background: #FAF8F4; color: #14120F;
  display: grid; place-items: center; min-height: 100vh; padding: 20px;
}
.box {
  text-align: center; padding: 40px;
  background: #fff; border-radius: 18px;
  box-shadow: 0 24px 64px rgba(20,18,15,0.10);
  max-width: 420px;
}
.brand { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.22em; color: #E05A1B; margin-bottom: 16px; }
.title { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; }
.sub { color: #4F4A42; font-size: 13px; line-height: 1.6; margin-bottom: 24px; }
.spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid #E8E5DE; border-top-color: #E05A1B; border-radius: 50%; animation: spin .9s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.err { color: #B23A2A; }
.link { display: inline-block; margin-top: 16px; padding: 10px 18px; background: #E05A1B; color: #fff; border-radius: 10px; text-decoration: none; font-size: 13px; font-weight: 600; }
</style>
</head>
<body>
<div class="box">
  <div class="brand">SUNNY BOARD</div>
  <div class="spinner"></div>
  <h1 class="title" id="title" style="margin-top:18px">로그인 처리 중...</h1>
  <p class="sub" id="sub">잠시만 기다려주세요.</p>
  <a class="link" id="retryLink" href="login.html" style="display:none">다시 로그인</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// 써니보드 Supabase 설정 — login.html과 동일 (Phase 1 = ai-pronote 프로젝트)
const SUPABASE_URL = 'https://pddasonkizwviwqzdhpu.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_g_WkmPy-txtru1D93pl8iA_kddaB4GQ';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const BASE = location.pathname.replace(/[^/]*$/, '');
const params = new URLSearchParams(location.search);
const rawRedirect = params.get('redirect') || BASE;
const redirectTo = (rawRedirect.startsWith('/') && !rawRedirect.startsWith('//')) ? rawRedirect : BASE;

document.getElementById('retryLink').setAttribute('href', BASE + 'login.html');

function fail(msg) {
  document.getElementById('title').textContent = '로그인 실패';
  document.getElementById('title').classList.add('err');
  document.getElementById('sub').textContent = msg;
  document.querySelector('.spinner').style.display = 'none';
  document.getElementById('retryLink').style.display = 'inline-block';
}

(async () => {
  try {
    // URL hash (#access_token=... = implicit flow) — SDK 자동 처리
    if (location.hash && location.hash.includes('access_token')) {
      await new Promise(r => setTimeout(r, 300));
    }
    // URL query (?code=... = PKCE flow)
    const code = params.get('code');
    if (code) {
      const { error } = await sb.auth.exchangeCodeForSession(code);
      if (error) throw error;
    }
    const errorParam = params.get('error_description') || params.get('error');
    if (errorParam) throw new Error(errorParam);

    const { data } = await sb.auth.getSession();
    if (!data.session) {
      throw new Error('세션 생성 실패. 다시 로그인해주세요.');
    }

    location.href = redirectTo;
  } catch (err) {
    fail(err.message || String(err));
  }
})();
</script>
</body>
</html>
