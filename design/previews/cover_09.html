<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>09 — Stripe 그라디언트</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css');
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  font-family: 'Inter', 'Pretendard Variable', sans-serif;
  color: #FFFFFF;
  aspect-ratio: 16 / 9;
  position: relative;
  overflow: hidden;
  background: linear-gradient(135deg, #635BFF 0%, #00D4FF 50%, #FF6BC8 100%);
}
body::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.18) 0%, transparent 35%),
    radial-gradient(circle at 80% 70%, rgba(99, 91, 255, 0.4) 0%, transparent 40%),
    radial-gradient(circle at 60% 20%, rgba(0, 212, 255, 0.3) 0%, transparent 30%);
  filter: blur(20px);
}
.layout {
  position: relative;
  z-index: 2;
  padding: 56px 80px;
  height: 100%;
  display: grid;
  grid-template-rows: auto 1fr auto;
  gap: 32px;
}
.header { display: flex; justify-content: space-between; align-items: center; }
.brand {
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -0.02em;
}
.nav {
  display: flex;
  gap: 24px;
  font-size: 13px;
  letter-spacing: 0.06em;
  color: rgba(255, 255, 255, 0.85);
  font-weight: 500;
}
.middle {
  display: grid;
  grid-template-columns: 1.5fr 1fr;
  gap: 40px;
  align-items: end;
}
.title-wrap { display: flex; flex-direction: column; gap: 24px; }
.eyebrow {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255, 255, 255, 0.85);
  display: flex;
  align-items: center;
  gap: 12px;
}
.eyebrow::before {
  content: '';
  width: 28px;
  height: 1px;
  background: rgba(255, 255, 255, 0.7);
}
.title {
  font-weight: 700;
  font-size: 92px;
  line-height: 1.0;
  letter-spacing: -0.04em;
  color: #FFFFFF;
}
.subtitle {
  font-size: 19px;
  font-weight: 400;
  color: rgba(255, 255, 255, 0.85);
  line-height: 1.55;
  max-width: 54ch;
}
.glass-card {
  background: rgba(255, 255, 255, 0.95);
  border: 1px solid rgba(255, 255, 255, 0.5);
  border-radius: 20px;
  padding: 32px;
  color: #0A0A0E;
  backdrop-filter: blur(18px);
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.glass-card .label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: #635BFF;
}
.glass-card .stat {
  font-size: 56px;
  font-weight: 800;
  letter-spacing: -0.04em;
  line-height: 1;
}
.glass-card .desc {
  font-size: 13px;
  color: rgba(10, 10, 14, 0.65);
  line-height: 1.55;
}
.glass-card .cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 600;
  color: #635BFF;
  margin-top: 8px;
}
.footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(255, 255, 255, 0.7);
  font-weight: 500;
}
</style>
</head>
<body>
  <div class="layout">
    <header class="header">
      <div class="brand">studio · capital</div>
      <nav class="nav">
        <span>Products</span>
        <span>Solutions</span>
        <span>Pricing</span>
        <span>Docs</span>
      </nav>
    </header>

    <div class="middle">
      <div class="title-wrap">
        <div class="eyebrow">Investor Brief · 2026 Q2</div>
        <h1 class="title">Global growth<br/>at investor scale.</h1>
        <p class="subtitle">시장 진입 전략 · 파트너십 구조 · 자본 조달 계획 — 글래스 카드 그라디언트 IR 양식.</p>
      </div>
      <div class="glass-card">
        <div class="label">ARR · 2026</div>
        <div class="stat">$8.2M</div>
        <p class="desc">YoY +47% · 글로벌 페스티벌 + IP 라이센싱 수익 통합 지표.</p>
        <span class="cta">View deck →</span>
      </div>
    </div>

    <footer class="footer">
      <span>STUDIO CAPITAL · 2026.05.22</span>
      <span>09 / GRADIENT IR</span>
    </footer>
  </div>
</body>
</html>
