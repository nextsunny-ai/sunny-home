<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SUNNY Works Timeline — 모든 작업 한 자리</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css" />
<style>
:root {
  --bg: #FAFAF7;
  --surface: #FFFFFF;
  --line: #E8E5DE;
  --line-strong: #D8D4CB;
  --text: #1A1A1F;
  --sub: #5C5C66;
  --mute: #8B8693;
  --accent: #1F4D3F;
  --accent-deep: #163A30;
  --accent-soft: #E8F0EC;
  --green: #2E7D5A;
  --orange: #C77A2E;
  --red: #B23A3A;
  --gray: #8B8693;
  --font-body: 'Pretendard Variable', Pretendard, sans-serif;
  --r-sm: 6px;
  --r: 12px;
  --r-lg: 18px;
  --shadow-1: 0 1px 2px rgba(26,26,31,.04);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
.app { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }

/* === 사이드바 === */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sb-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sb-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: -.01em;
}
.sb-status {
  font-size: 11px;
  color: var(--mute);
  display: flex;
  align-items: center;
  gap: 5px;
}
.sb-status .dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.sb-filters {
  display: flex;
  gap: 4px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--line);
  overflow-x: auto;
}
.sb-filter {
  padding: 4px 10px;
  font-size: 12px;
  background: transparent;
  border: 1px solid var(--line);
  border-radius: 100px;
  cursor: pointer;
  white-space: nowrap;
  color: var(--sub);
}
.sb-filter.active {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}
.sb-section {
  padding: 10px 12px 4px;
  font-size: 11px;
  font-weight: 600;
  color: var(--mute);
  text-transform: uppercase;
  letter-spacing: .04em;
}
.sb-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 8px 16px;
}
.sb-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 8px 10px;
  border-radius: var(--r-sm);
  cursor: pointer;
  margin-bottom: 1px;
  font-size: 13px;
  color: var(--text);
  transition: background 0.1s;
}
.sb-item:hover { background: var(--accent-soft); }
.sb-item.active { background: var(--accent-soft); font-weight: 500; }
.sb-item .icon {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
  margin-top: 4px;
}
.sb-item .icon.running { color: var(--orange); }
.sb-item .icon.done    { color: var(--green); }
.sb-item .icon.failed  { color: var(--red); }
.sb-item .icon.pending { color: var(--gray); }
.sb-item .body {
  flex: 1;
  min-width: 0;
}
.sb-item .agent {
  font-size: 11px;
  color: var(--mute);
  margin-bottom: 1px;
}
.sb-item .cmd {
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  line-height: 1.35;
}

/* === 메인 영역 === */
.main {
  overflow-y: auto;
  padding: 24px 32px;
}
.empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--mute);
  font-size: 14px;
}
.detail-header {
  padding-bottom: 18px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 18px;
}
.detail-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -.02em;
  margin-bottom: 8px;
}
.detail-meta {
  display: flex;
  gap: 16px;
  font-size: 12px;
  color: var(--sub);
}
.detail-meta span { display: inline-flex; align-items: center; gap: 4px; }
.status-badge {
  padding: 2px 8px;
  border-radius: 100px;
  font-size: 11px;
  font-weight: 600;
}
.status-running { background: #FFF4E6; color: var(--orange); }
.status-done    { background: var(--accent-soft); color: var(--green); }
.status-failed  { background: #FBE8E8; color: var(--red); }
.status-pending { background: #F0EEEA; color: var(--gray); }
.section { margin-top: 20px; }
.section-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--mute);
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: 8px;
}
.box {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 14px 16px;
  font-size: 13px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
}
.chat-msg {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 12px 14px;
  margin-bottom: 10px;
}
.chat-msg.user { background: var(--accent-soft); border-color: var(--accent-soft); }
.chat-msg .role {
  font-size: 11px;
  font-weight: 600;
  color: var(--mute);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.chat-msg .content {
  font-size: 13px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
}
.tool-use {
  background: #F5F4F0;
  border: 1px dashed var(--line-strong);
  border-radius: var(--r-sm);
  padding: 8px 10px;
  margin: 6px 0;
  font-size: 12px;
  color: var(--sub);
  font-family: 'JetBrains Mono', monospace;
}

@media (max-width: 768px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .sidebar.show { display: flex; position: fixed; inset: 0; z-index: 10; }
  .main { padding: 16px; }
  .toggle-sb { display: block; }
}
.toggle-sb {
  display: none;
  position: fixed;
  bottom: 20px;
  left: 20px;
  z-index: 11;
  padding: 10px 14px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 100px;
  font-size: 13px;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(0,0,0,.15);
}
</style>
</head>
<body>
<div class="app">
  <!-- 사이드바 -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-header">
      <div class="sb-title">Works Timeline</div>
      <div class="sb-status"><span class="dot"></span><span id="updated">갱신중...</span></div>
    </div>
    <div class="sb-filters">
      <button class="sb-filter active" data-filter="all">전체</button>
      <button class="sb-filter" data-filter="running">진행 중</button>
      <button class="sb-filter" data-filter="completed">완료</button>
      <button class="sb-filter" data-filter="failed">사고</button>
    </div>
    <div class="sb-list" id="list"></div>
  </aside>

  <!-- 메인 -->
  <main class="main" id="main">
    <div class="empty">← 왼쪽에서 작업을 선택하세요</div>
  </main>
</div>

<button class="toggle-sb" onclick="document.getElementById('sidebar').classList.toggle('show')">📋 작업 list</button>

<script>
const AGENT_NAMES = {
  genie: '지니', sera: '세라', nea: '네아', mori: '모리', birch: '버치',
  lumi: '루미', content: '루미', sori: '소리', maru: '마루',
  rian: '리안', teo: '테오', tech: '테오', hana: '하나', kai: '카이',
};

let allItems = [];
let activeFilter = 'all';
let activeId = null;

function statusIcon(s) {
  if (s === 'running' || s === 'pending') return '<svg class="icon running" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="8"/></svg>';
  if (s === 'completed' || s === 'done') return '<svg class="icon done" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="8"/></svg>';
  if (s === 'failed' || s === 'cancelled') return '<svg class="icon failed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M6 6 L18 18 M18 6 L6 18"/></svg>';
  return '<svg class="icon pending" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="8"/></svg>';
}

function statusBadge(s) {
  const map = { running: 'status-running', pending: 'status-running', completed: 'status-done', done: 'status-done', failed: 'status-failed', cancelled: 'status-failed' };
  const label = { running: '진행 중', pending: '대기', completed: '완료', done: '완료', failed: '사고', cancelled: '취소' };
  return `<span class="status-badge ${map[s] || 'status-pending'}">${label[s] || s}</span>`;
}

function fmtTime(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    const now = new Date();
    const diff = (now - d) / 1000;
    if (diff < 60) return '방금';
    if (diff < 3600) return `${Math.floor(diff / 60)}분 전`;
    if (diff < 86400) return `${Math.floor(diff / 3600)}시간 전`;
    if (diff < 86400 * 7) return `${Math.floor(diff / 86400)}일 전`;
    return d.toLocaleDateString('ko-KR');
  } catch { return iso; }
}

function renderList() {
  const list = document.getElementById('list');
  const filtered = allItems.filter(it => {
    if (activeFilter === 'all') return true;
    if (activeFilter === 'running') return ['running', 'pending'].includes(it.status);
    if (activeFilter === 'completed') return ['completed', 'done'].includes(it.status);
    if (activeFilter === 'failed') return ['failed', 'cancelled'].includes(it.status);
    return true;
  });

  // status별 그룹
  const groups = {
    '진행 중': filtered.filter(i => ['running', 'pending'].includes(i.status)),
    '완료': filtered.filter(i => ['completed', 'done'].includes(i.status)),
    '사고·취소': filtered.filter(i => ['failed', 'cancelled'].includes(i.status)),
  };

  let html = '';
  for (const [name, items] of Object.entries(groups)) {
    if (items.length === 0) continue;
    html += `<div class="sb-section">${name} (${items.length})</div>`;
    for (const it of items) {
      const agent = AGENT_NAMES[it.agent] || it.agent;
      const cmd = (it.command || '').replace(/\n/g, ' ');
      const isActive = it.id === activeId ? 'active' : '';
      html += `
        <div class="sb-item ${isActive}" data-id="${it.id}">
          ${statusIcon(it.status)}
          <div class="body">
            <div class="agent">${agent} · ${fmtTime(it.created)}</div>
            <div class="cmd">${escapeHtml(cmd)}</div>
          </div>
        </div>
      `;
    }
  }

  if (!html) html = '<div class="empty" style="height:200px;font-size:13px;">작업 없음</div>';
  list.innerHTML = html;
  list.querySelectorAll('.sb-item').forEach(el => {
    el.addEventListener('click', () => selectWork(el.dataset.id));
  });
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

// API endpoint = Oracle 서버
// 임시 = HTTP 직접 IP / 정식 = https://works.sunnytoon.com (= 후이즈 박힌 후)
const API_BASE = location.hostname === 'localhost' || location.protocol === 'file:'
  ? 'http://158.179.166.111:8000'
  : 'https://works.sunnytoon.com';

async function fetchList() {
  try {
    const r = await fetch(`${API_BASE}/api/works/recent?limit=100`);
    const data = await r.json();
    if (data.ok) {
      allItems = data.items || [];
      renderList();
      const now = new Date();
      document.getElementById('updated').textContent = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')} 갱신`;
    }
  } catch (e) {
    console.error('list fetch 사고:', e);
  }
}

async function selectWork(id) {
  activeId = id;
  renderList();
  const main = document.getElementById('main');
  main.innerHTML = '<div class="empty">불러오는 중...</div>';
  try {
    const r = await fetch(`${API_BASE}/api/works/${encodeURIComponent(id)}`);
    const data = await r.json();
    if (!data.ok) {
      main.innerHTML = `<div class="empty">자료 X: ${escapeHtml(data.error || '')}</div>`;
      return;
    }
    main.innerHTML = renderDetail(data);
  } catch (e) {
    main.innerHTML = `<div class="empty">자료 사고: ${e.message}</div>`;
  }
}

function renderDetail(data) {
  if (data.type === 'queue') {
    const it = data.item;
    const agent = AGENT_NAMES[it.agent] || it.agent;
    return `
      <div class="detail-header">
        <div class="detail-title">${agent} = 텔레그램 큐 #${it.id}</div>
        <div class="detail-meta">
          <span>${statusBadge(it.status)}</span>
          <span>📅 ${fmtTime(it.created)}</span>
          ${it.completed ? `<span>✓ ${fmtTime(it.completed)}</span>` : ''}
          <span>출처: 텔레그램</span>
        </div>
      </div>
      <div class="section">
        <div class="section-title">명령</div>
        <div class="box">${escapeHtml(it.command || '')}</div>
      </div>
      ${it.result ? `
      <div class="section">
        <div class="section-title">결과</div>
        <div class="box">${escapeHtml(it.result)}</div>
      </div>` : ''}
    `;
  }

  if (data.type === 'chat') {
    const agent = AGENT_NAMES[data.agent] || data.agent;
    const hist = data.history || [];
    let msgsHtml = '';
    for (const msg of hist) {
      const role = msg.role || 'unknown';
      let contentHtml = '';
      const c = msg.content;
      if (typeof c === 'string') {
        contentHtml = escapeHtml(c);
      } else if (Array.isArray(c)) {
        for (const x of c) {
          if (typeof x === 'string') contentHtml += escapeHtml(x);
          else if (x && x.type === 'text') contentHtml += escapeHtml(x.text || '');
          else if (x && x.type === 'tool_use') contentHtml += `<div class="tool-use">🔧 도구: ${escapeHtml(x.name)} = ${escapeHtml(JSON.stringify(x.input || {}).slice(0, 200))}</div>`;
          else if (x && x.type === 'tool_result') contentHtml += `<div class="tool-use">📥 결과: ${escapeHtml(String(x.content || '').slice(0, 300))}</div>`;
        }
      }
      msgsHtml += `<div class="chat-msg ${role}"><div class="role">${role}</div><div class="content">${contentHtml}</div></div>`;
    }
    return `
      <div class="detail-header">
        <div class="detail-title">${agent} = 채팅 자료</div>
        <div class="detail-meta">
          <span>💬 메시지 ${hist.length}개</span>
          <span>출처: 텔레그램·UI</span>
        </div>
      </div>
      <div class="section">
        <div class="section-title">최근 30개 메시지</div>
        ${msgsHtml || '<div class="box">메시지 없음</div>'}
      </div>
    `;
  }

  return '<div class="empty">알 수 없는 자료 type</div>';
}

// 필터 클릭
document.querySelectorAll('.sb-filter').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.sb-filter').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    activeFilter = b.dataset.filter;
    renderList();
  });
});

// 첫 로드 + 5초마다 갱신
fetchList();
setInterval(fetchList, 5000);
</script>
</body>
</html>
