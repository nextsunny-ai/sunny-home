<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunny Home</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --orange: #FF8C42;
  --deep-orange: #DC4B24;
  --bg: #111111;
  --bg-alt: #0d0d0d;
  --card-bg: #1a1a1a;
  --card-hover: #222222;
  --text: #f0f0f0;
  --text-dim: #777;
  --text-faint: #444;
  --blue: #0078D4;
  --green: #00C853;
  --purple: #9B59B6;
  --teal: #00BCD4;
  --pink: #E91E63;
  --yellow: #FFC107;
  --radius: 14px;
}

html { font-size: 16px; scroll-behavior: smooth; }
body {
  font-family: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  min-height: 100vh;
}

/* ─── TOP BAR ─── */
.top-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  display: flex; align-items: center;
  padding: 0 32px; height: 48px;
  background: rgba(10,10,10,0.75);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.top-bar-logo {
  font-size: 0.9rem; font-weight: 700; letter-spacing: 0.12em;
  background: linear-gradient(135deg, var(--orange), var(--deep-orange));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-right: 28px;
}
.top-bar-item {
  padding: 8px 14px; font-size: 0.78rem; font-weight: 400;
  color: rgba(255,255,255,0.4); cursor: pointer; transition: all 0.2s;
  border-radius: 6px; white-space: nowrap;
}
.top-bar-item:hover { color: var(--text); background: rgba(255,255,255,0.04); }
.top-bar-item.active { color: var(--orange); }
.top-bar-spacer { flex: 1; }
.top-bar-search {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 16px; background: rgba(255,255,255,0.05);
  border-radius: 20px; border: 1px solid rgba(255,255,255,0.06);
}
.top-bar-search:hover { border-color: rgba(255,140,66,0.25); }
.top-bar-search input {
  background: none; border: none; outline: none;
  color: var(--text); font-family: inherit; font-size: 0.78rem; width: 160px;
}
.top-bar-search input::placeholder { color: rgba(255,255,255,0.25); }

/* ─── MAIN LAYOUT ─── */
.main { padding-top: 48px; }

/* ─── HERO SECTION (2 columns) ─── */
.hero {
  display: grid; grid-template-columns: 5fr 7fr;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}

.hero-left {
  padding: 60px 48px 60px 64px;
  display: flex; flex-direction: column; justify-content: center;
  background: linear-gradient(160deg, #111 0%, #0d0d0d 60%, #0a0a0a 100%);
  position: relative; overflow: hidden;
}
.hero-left::before {
  content: ''; position: absolute; top: -40%; right: -20%;
  width: 600px; height: 600px; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,140,66,0.04) 0%, transparent 70%);
  pointer-events: none;
}

.hero-time {
  font-size: clamp(5.5rem, 12vw, 9rem);
  font-weight: 100; letter-spacing: -0.05em; line-height: 0.85;
  background: linear-gradient(135deg, var(--orange), var(--deep-orange));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.hero-date {
  font-size: clamp(1.1rem, 2.2vw, 1.6rem);
  font-weight: 200; color: var(--text-dim);
  margin-top: 10px; letter-spacing: 0.04em;
}
.hero-greeting {
  font-size: clamp(0.9rem, 1.6vw, 1.15rem);
  font-weight: 300; margin-top: 16px; color: rgba(255,255,255,0.55);
}

.hero-weather {
  display: inline-flex; align-items: center; gap: 12px;
  margin-top: 20px; padding: 10px 18px;
  background: rgba(255,140,66,0.06);
  border: 1px solid rgba(255,140,66,0.12);
  border-radius: 10px;
  align-self: flex-start;
}
.hero-weather .temp {
  font-size: 1.6rem; font-weight: 200; color: var(--orange);
}
.hero-weather .desc { font-size: 0.82rem; color: var(--text-dim); font-weight: 300; }

/* HERO RIGHT — NEWS PICK (fills entire right column) */
.hero-right {
  padding: 60px 48px 60px 36px;
  background: var(--bg-alt);
  border-left: 1px solid rgba(255,255,255,0.04);
  display: flex; flex-direction: column;
}
.hero-right-label {
  font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.2em;
  color: var(--orange); font-weight: 600; margin-bottom: 20px;
}

.pick-list {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  align-content: start;
}

.pick-card {
  display: flex; gap: 12px; padding: 10px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  cursor: pointer; text-decoration: none; color: var(--text);
  transition: all 0.2s; min-height: 0;
}
.pick-card:hover { background: rgba(255,140,66,0.08); border-color: rgba(255,140,66,0.3); }
.pick-card:hover { padding-left: 8px; }
.pick-card:hover .pick-title { color: var(--orange); }

.pick-img {
  width: 88px; min-height: 60px; border-radius: 10px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.8rem; overflow: hidden;
}
.pick-meta {
  display: flex; flex-direction: column; justify-content: center; flex: 1; min-width: 0;
}
.pick-cat {
  font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.12em;
  font-weight: 600; margin-bottom: 3px;
}
.pick-title {
  font-size: 0.88rem; font-weight: 500; line-height: 1.35;
  transition: color 0.2s;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.pick-source { font-size: 0.68rem; color: var(--text-dim); margin-top: 3px; }

/* ─── ENGLISH STRIP (between hero & mid) ─── */
.english-strip {
  display: flex; align-items: center; gap: 24px;
  padding: 16px 48px;
  background: rgba(255,140,66,0.04);
  border-bottom: 1px solid rgba(255,255,255,0.04);
  border-top: 1px solid rgba(255,140,66,0.08);
}
.english-strip .label {
  font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.16em;
  color: var(--orange); font-weight: 700; white-space: nowrap;
  padding: 4px 12px;
  background: rgba(255,140,66,0.08);
  border-radius: 4px;
}
.english-strip .phrase {
  font-size: 1rem; font-weight: 500; white-space: nowrap;
}
.english-strip .meaning {
  font-size: 0.82rem; color: var(--text-dim); white-space: nowrap;
}
.english-strip .divider {
  width: 1px; height: 20px; background: rgba(255,255,255,0.08); flex-shrink: 0;
}
.english-strip .example {
  font-size: 0.75rem; color: var(--text-faint); font-style: italic;
  flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* ─── MID SECTION (3 columns: Tools / Recent Projects / Notice) ─── */
.mid {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.mid-col {
  padding: 48px 40px;
  border-right: 1px solid rgba(255,255,255,0.04);
  min-height: 420px;
}
.mid-col:last-child { border-right: none; }
.mid-col:nth-child(1) { background: #0e0e0e; }
.mid-col:nth-child(2) { background: #111; }
.mid-col:nth-child(3) { background: #0e0e0e; }

.section-header {
  font-size: clamp(2.2rem, 5vw, 3.5rem);
  font-weight: 200; letter-spacing: -0.03em; line-height: 1;
  margin-bottom: 28px; color: var(--text); opacity: 0.9;
}

/* Tools Grid */
.tools-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
}
.tool-tile {
  border-radius: 12px; padding: 18px;
  display: flex; flex-direction: column; justify-content: space-between;
  cursor: pointer; transition: all 0.25s; text-decoration: none; color: white;
  position: relative; overflow: hidden; min-height: 100px;
}
.tool-tile::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
  opacity: 0; transition: opacity 0.3s;
}
.tool-tile:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.5); }
.tool-tile:hover::after { opacity: 1; }
.tool-tile .icon { font-size: 1.8rem; line-height: 1; margin-bottom: 12px; }
.tool-tile .name { font-size: 0.8rem; font-weight: 600; letter-spacing: 0.02em; }
.tool-tile .desc { font-size: 0.65rem; opacity: 0.65; font-weight: 300; margin-top: 2px; }

.tile-orange { background: linear-gradient(135deg, #FF8C42, #DC4B24); }
.tile-blue { background: linear-gradient(135deg, #0078D4, #005A9E); }
.tile-green { background: linear-gradient(135deg, #00C853, #009624); }
.tile-purple { background: linear-gradient(135deg, #9B59B6, #6C3483); }
.tile-teal { background: linear-gradient(135deg, #00BCD4, #00838F); }
.tile-pink { background: linear-gradient(135deg, #E91E63, #AD1457); }
.tile-dark { background: linear-gradient(135deg, #2a2a2a, #1a1a1a); border: 1px solid rgba(255,255,255,0.06); }
.tile-yellow { background: linear-gradient(135deg, #FFC107, #FF8F00); color: #1a1a1a; }

.tool-tile.wide { grid-column: span 2; min-height: 80px; }

/* Recent Projects (GitHub) */
.project-card {
  display: block; padding: 14px 16px;
  background: rgba(255,255,255,0.02); border-radius: 10px;
  margin-bottom: 10px; cursor: pointer; text-decoration: none; color: var(--text);
  border-left: 3px solid rgba(255,140,66,0.25);
  transition: all 0.2s;
}
.project-card:hover { background: rgba(255,255,255,0.05); border-left-color: var(--orange); }
.project-card .repo-name {
  font-size: 0.85rem; font-weight: 600; margin-bottom: 3px;
}
.project-card .repo-desc {
  font-size: 0.72rem; color: var(--text-dim); line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.project-card .repo-time {
  font-size: 0.62rem; color: var(--text-faint); margin-top: 4px;
}

/* Notice */
.notice-card {
  display: flex; gap: 12px; padding: 14px 16px;
  background: rgba(255,255,255,0.02); border-radius: 10px;
  border-left: 3px solid var(--orange); margin-bottom: 10px;
  transition: background 0.2s;
}
.notice-card:hover { background: rgba(255,255,255,0.04); }
.notice-sender {
  font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.06em; padding: 3px 8px; border-radius: 5px;
  white-space: nowrap; flex-shrink: 0; height: fit-content;
}
.sender-rian { background: rgba(255,140,66,0.12); color: var(--orange); }
.sender-teo { background: rgba(0,120,212,0.12); color: var(--blue); }
.sender-hana { background: rgba(0,188,212,0.12); color: var(--teal); }
.sender-sera { background: rgba(233,30,99,0.12); color: var(--pink); }
.sender-genie { background: rgba(155,89,182,0.12); color: var(--purple); }
.notice-body { flex: 1; }
.notice-body .msg { font-size: 0.82rem; line-height: 1.45; }
.notice-body .time { font-size: 0.65rem; color: var(--text-faint); margin-top: 4px; }

/* ─── NEWS SECTION (full bottom) ─── */
.news-section {
  padding: 56px 48px 80px;
  background: var(--bg-alt);
}
.news-section .section-header { margin-bottom: 12px; }

.news-tabs {
  display: flex; gap: 20px; margin-bottom: 32px;
  font-size: 0.82rem; font-weight: 300; color: var(--text-dim);
  flex-wrap: wrap;
}
.news-tab {
  cursor: pointer; transition: color 0.2s; padding: 4px 0;
  border-bottom: 2px solid transparent;
}
.news-tab:hover, .news-tab.active { color: var(--orange); border-bottom-color: var(--orange); }

.news-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}
.news-card {
  background: var(--card-bg); border-radius: var(--radius);
  overflow: hidden; cursor: pointer; transition: all 0.3s;
  text-decoration: none; color: var(--text);
  display: flex; flex-direction: column;
}
.news-card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.5); }
.news-card.featured {
  grid-column: span 2; grid-row: span 2;
}

.news-card-img {
  width: 100%; aspect-ratio: 16/9;
  display: flex; align-items: center; justify-content: center;
  font-size: 2.8rem; position: relative;
}
.news-card.featured .news-card-img { aspect-ratio: 4/3; font-size: 4.5rem; }

.news-card-body {
  padding: 18px 20px; flex: 1;
  display: flex; flex-direction: column;
}
.news-card .cat-tag {
  font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.12em;
  font-weight: 700; margin-bottom: 6px;
}
.cat-ai { color: var(--blue); }
.cat-performance { color: var(--pink); }
.cat-exhibition { color: var(--teal); }
.cat-content_ip { color: var(--purple); }
.cat-design { color: var(--yellow); }
.cat-grants { color: var(--green); }
.cat-festival { color: var(--orange); }

.news-card .title {
  font-size: 0.92rem; font-weight: 500; line-height: 1.4; margin-bottom: 8px;
}
.news-card.featured .title { font-size: 1.4rem; }
.news-card .excerpt {
  font-size: 0.78rem; color: var(--text-dim); line-height: 1.5; flex: 1;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}
.news-card .meta {
  font-size: 0.65rem; color: var(--text-faint); margin-top: 10px;
}

/* ─── ANIMATIONS ─── */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}
.hero-time, .hero-date, .hero-greeting, .hero-weather {
  animation: fadeInUp 0.7s ease-out both;
}
.hero-date { animation-delay: 0.08s; }
.hero-greeting { animation-delay: 0.15s; }
.hero-weather { animation-delay: 0.22s; }
.hero-right-label { animation: fadeInUp 0.6s ease-out 0.1s both; }
.english-strip { animation: fadeInUp 0.5s ease-out 0.3s both; }

/* ─── MOBILE ─── */
@media (max-width: 900px) {
  .hero { grid-template-columns: 1fr; }
  .hero-left { padding: 80px 24px 32px; }
  .hero-right { padding: 32px 24px; border-left: none; border-top: 1px solid rgba(255,255,255,0.04); }
  .hero-time { font-size: 4.5rem; }
  .english-strip {
    flex-direction: column; gap: 8px; padding: 16px 24px; align-items: flex-start;
  }
  .english-strip .example { white-space: normal; }
  .english-strip .phrase { white-space: normal; }
  .english-strip .meaning { white-space: normal; }
  .english-strip .divider { display: none; }
  .mid { grid-template-columns: 1fr; }
  .mid-col { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.04); padding: 40px 24px; min-height: auto; }
  .tools-grid { grid-template-columns: repeat(2, 1fr); }
  .news-section { padding: 40px 20px 60px; }
  .news-grid { grid-template-columns: 1fr; }
  .news-card.featured { grid-column: span 1; grid-row: span 1; }
  .top-bar { padding: 0 16px; }
  .top-bar-search { display: none; }
  .top-bar { overflow-x: auto; scrollbar-width: none; }
  .top-bar::-webkit-scrollbar { display: none; }
  .section-header { font-size: 2.4rem; }
  .pick-img { width: 72px; min-height: 48px; }
}

@media (min-width: 901px) and (max-width: 1200px) {
  .hero { grid-template-columns: 1fr 1fr; }
  .hero-left { padding: 50px 32px 40px 40px; }
  .hero-right { padding: 50px 28px 40px 24px; }
  .hero-time { font-size: 5.5rem; }
  .mid { grid-template-columns: 1fr 1fr; }
  .mid-col:nth-child(3) { grid-column: span 2; }
  .news-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <span class="top-bar-logo">SUNNY</span>
  <span class="top-bar-item active" data-section="hero">Today</span>
  <span class="top-bar-item" data-section="mid">Tools</span>
  <span class="top-bar-item" data-section="news-section">News</span>
  <span class="top-bar-spacer"></span>
  <div class="top-bar-search">
    <span style="color:rgba(255,255,255,0.25);font-size:0.82rem">&#128269;</span>
    <input type="text" placeholder="Search Google..." id="searchInput">
  </div>
</div>

<div class="main">

  <!-- ═══ HERO ═══ -->
  <section class="hero" id="hero">
    <!-- LEFT: Time / Date / Greeting / Weather ONLY -->
    <div class="hero-left">
      <div class="hero-time" id="timeDisplay">--:--</div>
      <div class="hero-date" id="dateDisplay"></div>
      <div class="hero-greeting" id="greeting"></div>
      <div class="hero-weather">
        <span style="font-size:1.4rem">&#9925;</span>
        <span class="temp" id="weatherTemp">--&deg;</span>
        <span class="desc" id="weatherDesc">Loading...</span>
      </div>
    </div>

    <!-- RIGHT: News Pick — fills entire right area -->
    <div class="hero-right">
      <div class="hero-right-label">&#9733; News Pick</div>
      <div class="pick-list" id="newsPick"><!-- filled by JS --></div>
    </div>
  </section>

  <!-- ═══ ENGLISH STRIP ═══ -->
  <div class="english-strip" id="englishStrip">
    <span class="label">Today's Business English</span>
    <span class="phrase" id="engPhrase">"Let's circle back on that."</span>
    <span class="divider"></span>
    <span class="meaning" id="engMeaning">그 건은 나중에 다시 논의하죠.</span>
    <span class="divider"></span>
    <span class="example" id="engExample">We're running out of time — let's circle back on the budget issue after lunch.</span>
  </div>

  <!-- ═══ MID: Tools / Recent Projects / Notice ═══ -->
  <section class="mid" id="mid">
    <!-- COL 1: Tools -->
    <div class="mid-col">
      <div class="section-header">Tools</div>
      <div class="tools-grid" id="toolsGrid"><!-- filled by JS --></div>
    </div>

    <!-- COL 2: Recent Projects -->
    <div class="mid-col">
      <div class="section-header">Recent Projects</div>
      <div id="projectsList">
        <div style="color:var(--text-dim);font-size:0.82rem;">Loading projects...</div>
      </div>
    </div>

    <!-- COL 3: Notice -->
    <div class="mid-col">
      <div class="section-header">Notice</div>
      <div id="noticeList"><!-- filled by JS --></div>
    </div>
  </section>

  <!-- ═══ NEWS (full bottom) ═══ -->
  <section class="news-section" id="news-section">
    <div class="section-header">News</div>
    <div class="news-tabs" id="newsTabs">
      <span class="news-tab active" data-cat="all">All</span>
      <span class="news-tab" data-cat="ai">AI</span>
      <span class="news-tab" data-cat="performance">&#44277;&#50672;</span>
      <span class="news-tab" data-cat="exhibition">&#51204;&#49884;</span>
      <span class="news-tab" data-cat="content_ip">&#53080;&#53584;&#52768;IP</span>
      <span class="news-tab" data-cat="design">&#46356;&#51088;&#51064;</span>
      <span class="news-tab" data-cat="grants">&#51648;&#50896;&#49324;&#50629;</span>
      <span class="news-tab" data-cat="festival">&#54168;&#49828;&#54000;&#48268;</span>
    </div>
    <div class="news-grid" id="newsGrid"><!-- filled by JS --></div>
  </section>

</div>

<script>
// ═══ TIME & DATE ═══
function updateTime() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('timeDisplay').textContent = h + ':' + m;

  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('dateDisplay').textContent =
    days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();

  const hour = now.getHours();
  let greet = 'Good evening, Sunny';
  if (hour < 6) greet = 'Still up, Sunny?';
  else if (hour < 12) greet = 'Good morning, Sunny';
  else if (hour < 18) greet = 'Good afternoon, Sunny';
  document.getElementById('greeting').textContent = greet;
}
updateTime();
setInterval(updateTime, 30000);

// ═══ WEATHER (placeholder) ═══
document.getElementById('weatherTemp').innerHTML = '18&deg;';
document.getElementById('weatherDesc').textContent = 'Seoul, partly cloudy';

// ═══ BUSINESS ENGLISH (placeholder fallback) ═══
const defaultEnglish = [
  { phrase: "Let's circle back on that.", meaning: "그 건은 나중에 다시 논의하죠.", example: "We're running out of time — let's circle back on the budget issue after lunch." },
  { phrase: "I'll loop you in.", meaning: "당신도 포함시킬게요.", example: "I'll loop you in on the email thread so you have full context." },
  { phrase: "Let's table this for now.", meaning: "이건 일단 보류합시다.", example: "We're behind schedule — let's table this for now and revisit next week." },

async function loadProjects() {
  try {
    const res = await fetch('https://api.github.com/users/nextsunny-ai/repos?sort=pushed&per_page=8');

    const list = document.getElementById('projectsList');

      const a = document.createElement('a');

      // If has GitHub Pages, link to it; else link to repo
      const pageUrl = repo.has_pages ? 'https://nextsunny-ai.github.io/' + repo.name + '/' : repo.html_url;
      a.href = pageUrl; a.target = '_blank'; a.rel = 'noopener';
      a.innerHTML =

        '<div class="repo-desc">' + escHtml(repo.description || 'No description') + '</div>' +
        '<div class="repo-time">pushed ' + timeAgo(repo.pushed_at) + '</div>';

    });

    if (list.children.length === 0) {
      list.innerHTML = '<div style="color:var(--text-dim);font-size:0.82rem;">No projects found</div>';
    }
  } catch(e) {
    document.getElementById('projectsList').innerHTML =
      '<div style="color:var(--text-dim);font-size:0.82rem;">Could not load projects</div>';
  }
}

const catIcons = {
  ai: "\uD83E\uDD16", performance: "\uD83C\uDFAD", exhibition: "\uD83D\uDDBC\uFE0F",
  content_ip: "\uD83C\uDFAC", design: "\u2728", grants: "\uD83D\uDCCB", festival: "\uD83C\uDFB5"
};
const catColors = {
  ai: 'linear-gradient(135deg,#0a1628,#0d2137)',
  performance: 'linear-gradient(135deg,#1a0a14,#2a0f1f)',
  exhibition: 'linear-gradient(135deg,#0a1a1a,#0f2a2a)',

  grants: 'linear-gradient(135deg,#081a0d,#0f2a18)',

};
const catNames = {
  ai: 'AI', performance: '공연', exhibition: '전시',
  content_ip: '콘텐츠IP', design: '디자인', grants: '지원사업', festival: '페스티벌'
};

let allNewsItems = [];

function buildNewsItems(data) {
  allNewsItems = [];
  if (!data || !data.categories) return;
  data.categories.forEach(cat => {
    if (cat.id === 'english') return;
    (cat.items || []).forEach(item => {
      allNewsItems.push({
        cat: cat.id,
        catName: catNames[cat.id] || cat.name,
        title: item.title,
        url: item.url || '#',
        source: item.source || '',
        summary: item.summary || '',
        published: item.published || '',
        image: item.image || ''
      });
    });
  });
}

function renderNews(filter) {
  const newsGrid = document.getElementById('newsGrid');
  newsGrid.innerHTML = '';
  const items = filter === 'all' ? allNewsItems : allNewsItems.filter(n => n.cat === filter);

  items.forEach((n, i) => {
    const card = document.createElement('a');
    const isFeatured = (filter === 'all' && i === 0);
    card.className = 'news-card' + (isFeatured ? ' featured' : '');
    card.href = n.url; card.target = '_blank'; card.rel = 'noopener';
    const icon = catIcons[n.cat] || "\uD83D\uDCF0";
    const bg = catColors[n.cat] || catColors.ai;
    card.innerHTML =
      (n.image ? '<div class="news-card-img" style="background:#1a1a2e center/cover no-repeat url(' + JSON.stringify(n.image) + ')"></div>' : '<div class="news-card-img" style="background:' + bg + '">' + icon + '</div>') +
      '<div class="news-card-body">' +
      '<div class="cat-tag cat-' + n.cat + '">' + n.catName + '</div>' +
      '<div class="title">' + escHtml(n.title) + '</div>' +
      '<div class="excerpt">' + escHtml(n.summary) + '</div>' +
      '<div class="meta">' + n.source + (n.published ? ' · ' + n.published : '') + '</div></div>';
    newsGrid.appendChild(card);
  });
}

// News Pick (Hero Right) — priority-weighted 6 items to fill the space
function renderNewsPick() {
  const pickContainer = document.getElementById('newsPick');
  pickContainer.innerHTML = '';
  if (!allNewsItems.length) return;

  // Priority order: AI > content_ip > performance > exhibition > grants > design > festival
  const priority = ['ai','content_ip','performance','exhibition','grants','design','festival'];
  const sorted = [...allNewsItems].sort((a, b) => {
    const pa = priority.indexOf(a.cat);
    const pb = priority.indexOf(b.cat);
    return (pa === -1 ? 99 : pa) - (pb === -1 ? 99 : pb);
  });

  // Pick up to 12, trying to get variety
  const picked = [];
  const usedCats = new Set();
  // First pass: one per category
  sorted.forEach(n => {
    if (picked.length >= 12) return;
    if (!usedCats.has(n.cat)) {
      picked.push(n);
      usedCats.add(n.cat);
    }
  });
  // Second pass: fill remaining
  sorted.forEach(n => {
    if (picked.length >= 12) return;
    if (!picked.includes(n)) picked.push(n);
  });

  picked.forEach(n => {
    const a = document.createElement('a');
    a.className = 'pick-card'; a.href = n.url; a.target = '_blank'; a.rel = 'noopener';
    const icon = catIcons[n.cat] || "\uD83D\uDCF0";
    const bg = catColors[n.cat] || catColors.ai;
    a.innerHTML =
      '<div class="pick-img" style="background:' + bg + '">' + icon + '</div>' +
      '<div class="pick-meta">' +
      '<div class="pick-cat cat-' + n.cat + '">' + n.catName + '</div>' +
      '<div class="pick-title">' + escHtml(n.title) + '</div>' +
      '<div class="pick-source">' + n.source + '</div></div>';
    pickContainer.appendChild(a);
  });
}

// ═══ HELPERS ═══
function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 60) return mins + 'm ago';
  const hours = Math.floor(mins / 60);
  if (hours < 24) return hours + 'h ago';
  const days = Math.floor(hours / 24);
  return days + 'd ago';
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
