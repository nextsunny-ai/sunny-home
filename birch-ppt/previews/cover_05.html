<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>05 — 다크 디지털 아트</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&display=swap');
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css');

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  background: #0A0A12;
  color: #FFFFFF;
  font-family: 'Bricolage Grotesque', 'Pretendard Variable', sans-serif;
  aspect-ratio: 16 / 9;
  position: relative;
  padding: 56px 80px;
  display: grid;
  grid-template-rows: auto 1fr auto;
  overflow: hidden;
}
body::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 80% 30%, rgba(199, 123, 255, 0.45) 0%, transparent 45%),
    radial-gradient(ellipse at 20% 80%, rgba(95, 234, 175, 0.35) 0%, transparent 45%),
    radial-gradient(ellipse at 60% 90%, rgba(255, 95, 169, 0.35) 0%, transparent 40%),
    radial-gradient(ellipse at 35% 25%, rgba(91, 196, 245, 0.25) 0%, transparent 50%);
  filter: blur(0px);
  z-index: 0;
}
body::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px),
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px, 80px 80px, 80px 80px;
  z-index: 1;
  pointer-events: none;
}
.top-bar, .middle, .bottom-bar { position: relative; z-index: 3; }
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-bottom: 16px;
}
.brand {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -0.02em;
  display: flex;
  align-items: center;
  gap: 10px;
}
.brand-mark {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 800;
  font-size: 22px;
  background: linear-gradient(135deg, #C77BFF 0%, #5FEAAF 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.section-tag {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 12px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255, 255, 255, 0.5);
}
.middle {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 28px;
  padding: 40px 0;
}
.eyebrow {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 14px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255, 255, 255, 0.7);
  display: flex;
  align-items: center;
  gap: 14px;
}
.eyebrow::before {
  content: '';
  width: 32px;
  height: 1px;
  background: rgba(255,255,255,0.5);
}
.title {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 128px;
  font-weight: 800;
  line-height: 0.92;
  letter-spacing: -0.045em;
  color: #FFFFFF;
}
.title .glyph {
  font-style: italic;
  background: linear-gradient(135deg, #C77BFF 0%, #5FEAAF 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.subtitle {
  font-family: 'Pretendard Variable', sans-serif;
  font-size: 20px;
  font-weight: 400;
  color: rgba(255, 255, 255, 0.7);
  line-height: 1.55;
  max-width: 56ch;
}
.bottom-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid rgba(255,255,255,0.12);
  padding-top: 20px;
}
.chips { display: flex; gap: 10px; }
.chip {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.05em;
  padding: 8px 14px;
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 999px;
  color: rgba(255,255,255,0.8);
  backdrop-filter: blur(8px);
  background: rgba(255,255,255,0.04);
}
.date {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 12px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
}
</style>
</head>
<body>
  <div class="top-bar">
    <div class="brand"><span class="brand-mark">◐</span> Studio · Digital</div>
    <div class="section-tag">05 / Dark Digital Art</div>
  </div>

  <div class="middle">
    <div class="eyebrow">Immersive Festival Experience</div>
    <h1 class="title">P<span class="glyph">o</span>rt<span class="glyph">a</span><br/>~ digit<span class="glyph">A</span>l art</h1>
    <p class="subtitle">디지털 아트 · 미디어아트 · 라이브 사운드가 결합된 다크 + 네온 비주얼 톤.</p>
  </div>

  <div class="bottom-bar">
    <div class="chips">
      <span class="chip">Artwork</span>
      <span class="chip">Platform</span>
      <span class="chip">3D · AI</span>
    </div>
    <div class="date">2026 · 05 · 22</div>
  </div>
</body>
</html>
