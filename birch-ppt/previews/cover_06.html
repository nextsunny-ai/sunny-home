<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>06 — 에디토리얼 매거진</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&display=swap');
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css');

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  background: #F5F4F0;
  color: #1A1A22;
  font-family: 'Pretendard Variable', Pretendard, sans-serif;
  aspect-ratio: 16 / 9;
  padding: 48px 56px;
  display: grid;
  grid-template-rows: auto 1fr auto;
  gap: 32px;
}
.top-pill {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 10px 18px;
  border: 1px solid rgba(26, 26, 34, 0.2);
  border-radius: 999px;
  background: #FFFFFF;
  font-size: 13px;
  letter-spacing: 0.05em;
  width: fit-content;
  font-weight: 500;
}
.middle {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  grid-template-rows: auto 1fr;
  gap: 24px;
}
.title-card {
  grid-column: 1 / 2;
  background: #FFFFFF;
  border-radius: 24px;
  padding: 48px 48px;
  position: relative;
}
.title {
  font-family: 'Fraunces', serif;
  font-weight: 500;
  font-size: 80px;
  line-height: 1.0;
  letter-spacing: -0.02em;
  color: #1A1A22;
  max-width: 14ch;
}
.title em {
  font-style: italic;
  font-weight: 400;
  color: #6C6C75;
}
.title-card .more {
  position: absolute;
  bottom: 36px;
  right: 36px;
  width: 56px;
  height: 56px;
  border-radius: 999px;
  background: #1A1A22;
  color: #FFFFFF;
  display: grid;
  place-items: center;
  font-size: 24px;
}
.section-mark {
  grid-column: 2 / 3;
  grid-row: 1 / 3;
  background: #1A1A22;
  color: #FFFFFF;
  border-radius: 24px;
  padding: 40px 40px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.section-mark .pill {
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 8px 14px;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 999px;
  width: fit-content;
  color: rgba(255,255,255,0.85);
}
.section-mark .num {
  font-family: 'Fraunces', serif;
  font-weight: 400;
  font-size: 200px;
  line-height: 0.9;
  letter-spacing: -0.06em;
  margin-top: -12px;
}
.section-mark .name {
  font-family: 'Fraunces', serif;
  font-size: 36px;
  font-weight: 500;
  letter-spacing: -0.01em;
  line-height: 1.05;
}
.section-mark .lead {
  font-size: 13px;
  font-weight: 400;
  color: rgba(255,255,255,0.7);
  line-height: 1.55;
  max-width: 32ch;
}
.cards-row {
  grid-column: 1 / 2;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
.mini-card {
  border-radius: 20px;
  padding: 28px 28px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-height: 180px;
}
.mini-card.mint { background: #C8E0D5; color: #1A1A22; }
.mini-card.mauve { background: #3E2F2F; color: #FFFFFF; }
.mini-card .value {
  font-family: 'Fraunces', serif;
  font-size: 44px;
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1;
}
.mini-card .label {
  font-size: 12px;
  letter-spacing: 0.05em;
  opacity: 0.7;
}
.bottom-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  letter-spacing: 0.08em;
  color: rgba(26,26,34,0.5);
  text-transform: uppercase;
}
</style>
</head>
<body>
  <div class="top-pill">⌃ WELCOME · STUDIO</div>

  <div class="middle">
    <div class="title-card">
      <h1 class="title">A new chapter <em>in</em><br/>live entertainment.</h1>
      <div class="more">↗</div>
    </div>
    <div class="section-mark">
      <span class="pill">Section 01</span>
      <div class="num">01</div>
      <h2 class="name">Brand<br/>Direction</h2>
      <p class="lead">브랜드 디렉션 · 2026 비주얼 가이드 · 콘텐츠 전략 통합 양식.</p>
    </div>
    <div class="cards-row">
      <div class="mini-card mint">
        <div class="label">Touring</div>
        <div class="value">500+ shows</div>
      </div>
      <div class="mini-card mauve">
        <div class="label">Years on the Road</div>
        <div class="value">25 years</div>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <span>© 2026 STUDIO · ALL RIGHTS RESERVED</span>
    <span>EDITORIAL · 06 / COVER</span>
  </div>
</body>
</html>
