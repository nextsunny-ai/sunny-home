<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>08 — Apple 벤토 그리드</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css');
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  background: #FAFAFA;
  color: #0A0A0E;
  font-family: 'Inter', 'Pretendard Variable', sans-serif;
  aspect-ratio: 16 / 9;
  padding: 56px 64px;
  display: grid;
  grid-template-rows: auto 1fr auto;
  gap: 28px;
}
.header { display: flex; justify-content: space-between; align-items: center; }
.brand {
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -0.02em;
  display: flex;
  align-items: center;
  gap: 10px;
}
.brand .dot {
  width: 10px;
  height: 10px;
  background: #0A0A0E;
  border-radius: 999px;
}
.section-tag {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(10, 10, 14, 0.5);
}
.grid {
  display: grid;
  grid-template-columns: 1.5fr 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 16px;
}
.cell {
  border-radius: 28px;
  padding: 36px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  position: relative;
  overflow: hidden;
}
.cell-1 {
  grid-column: 1 / 2;
  grid-row: 1 / 3;
  background: linear-gradient(160deg, #1A1A22 0%, #2A2A35 100%);
  color: #FFFFFF;
}
.cell-2 { background: #E2F1FF; color: #0A0A0E; }
.cell-3 { background: #FFE9DC; color: #0A0A0E; }
.cell-4 { background: #E5F8E5; color: #0A0A0E; }
.cell-5 { background: #F5E5FF; color: #0A0A0E; }
.cell-label {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  opacity: 0.6;
}
.cell-main {
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1;
}
.cell-1 .cell-main { font-size: 64px; line-height: 1.05; max-width: 12ch; }
.cell-1 .desc {
  font-size: 14px;
  color: rgba(255, 255, 255, 0.7);
  line-height: 1.6;
  margin-top: 16px;
  max-width: 32ch;
}
.cell-2 .cell-main, .cell-3 .cell-main, .cell-4 .cell-main, .cell-5 .cell-main {
  font-size: 42px;
}
.cell-1 .badge {
  position: absolute;
  top: 36px;
  right: 36px;
  width: 44px;
  height: 44px;
  border: 1.5px solid rgba(255, 255, 255, 0.3);
  border-radius: 999px;
  display: grid;
  place-items: center;
  font-size: 18px;
}
.footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(10, 10, 14, 0.45);
  font-weight: 500;
}
</style>
</head>
<body>
  <header class="header">
    <div class="brand"><span class="dot"></span>Nextart · Showcase</div>
    <div class="section-tag">08 / Bento Grid</div>
  </header>

  <div class="grid">
    <div class="cell cell-1">
      <div>
        <div class="cell-label">2026 Portfolio</div>
      </div>
      <div>
        <div class="cell-main">Portfolio<br/>Showcase</div>
        <p class="desc">주요 프로젝트 · 성과 지표 · 사업 영역 — 한 페이지에 정리한 포트폴리오 양식.</p>
      </div>
      <div class="badge">↗</div>
    </div>

    <div class="cell cell-2">
      <div class="cell-label">Touring</div>
      <div class="cell-main">500+</div>
    </div>

    <div class="cell cell-3">
      <div class="cell-label">Festivals</div>
      <div class="cell-main">12</div>
    </div>

    <div class="cell cell-4">
      <div class="cell-label">Exhibitions</div>
      <div class="cell-main">8</div>
    </div>

    <div class="cell cell-5">
      <div class="cell-label">Countries</div>
      <div class="cell-main">14</div>
    </div>
  </div>

  <footer class="footer">
    <span>Author Name · 2026.05.22</span>
    <span>COVER / 01</span>
  </footer>
</body>
</html>
